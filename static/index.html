<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar Spread Trading</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <span class="header-logo">$ CS</span>
                <span class="header-title">Calendar Spread Trading</span>
            </div>
            <div class="header-right">
                <button id="conn-btn" class="connection-status">
                    <span class="status-dot"></span> Connect IBKR
                </button>
            </div>
        </header>

        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="nav-section">
                <div class="nav-label">Trading</div>
                <div class="nav-item active" data-tab="signals">
                    <span class="icon">S</span> Signals
                    <span class="nav-badge" id="badge-signals"></span>
                </div>
                <div class="nav-item" data-tab="portfolio">
                    <span class="icon">P</span> Portfolio
                    <span class="nav-badge" id="badge-portfolio"></span>
                </div>
                <div class="nav-item" data-tab="orders">
                    <span class="icon">O</span> Orders
                </div>
            </div>

            <div class="nav-section">
                <div class="nav-label">Analytics</div>
                <div class="nav-item" data-tab="kelly">
                    <span class="icon">K</span> Kelly
                </div>
                <div class="nav-item" data-tab="risk">
                    <span class="icon">R</span> Risk
                </div>
                <div class="nav-item" data-tab="straddle">
                    <span class="icon">V</span> Vol Ramp
                    <span class="nav-badge" id="badge-straddle"></span>
                </div>
            </div>

            <div class="sidebar-stats">
                <div class="stat-row">
                    <span class="stat-label">Account</span>
                    <span class="stat-value" id="stat-account">-</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Kelly f</span>
                    <span class="stat-value accent" id="stat-kelly">-</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Positions</span>
                    <span class="stat-value" id="stat-positions">-</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Deployed</span>
                    <span class="stat-value green" id="stat-deployed">-</span>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main">
            <div id="tab-signals" class="tab-content active">
                <div id="signals-content">
                    <div class="loading"><div class="spinner"></div> Loading...</div>
                </div>
            </div>

            <div id="tab-portfolio" class="tab-content">
                <div id="portfolio-content">
                    <div class="loading"><div class="spinner"></div> Loading...</div>
                </div>
            </div>

            <div id="tab-orders" class="tab-content">
                <div id="orders-content">
                    <div class="loading"><div class="spinner"></div> Loading...</div>
                </div>
            </div>

            <div id="tab-kelly" class="tab-content">
                <div id="kelly-content">
                    <div class="loading"><div class="spinner"></div> Loading...</div>
                </div>
            </div>

            <div id="tab-risk" class="tab-content">
                <div id="risk-content">
                    <div class="loading"><div class="spinner"></div> Loading...</div>
                </div>
            </div>

            <div id="tab-straddle" class="tab-content">
                <div id="straddle-content">
                    <div class="loading"><div class="spinner"></div> Loading...</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Connect Modal -->
    <div id="connect-modal" class="modal-backdrop">
        <div class="modal">
            <div class="modal-title">Connect to IBKR</div>
            <label style="font-size:13px;color:var(--text-secondary)">Host</label>
            <input id="ibkr-host" type="text" value="127.0.0.1" placeholder="127.0.0.1">
            <label style="font-size:13px;color:var(--text-secondary)">Port (4002=Gateway, 7497=TWS)</label>
            <input id="ibkr-port" type="number" value="4002" placeholder="4002">
            <div class="modal-actions">
                <button class="btn" onclick="closeModal('connect-modal')">Cancel</button>
                <button class="btn btn-primary" id="connect-go" onclick="doConnect()">Connect</button>
            </div>
        </div>
    </div>

    <!-- Order Confirm Modal -->
    <div id="order-modal" class="modal-backdrop">
        <div class="modal">
            <div class="modal-title">Confirm Optimal Execution</div>
            <div id="order-confirm-body" style="font-size:13px; color:var(--text-secondary); margin-bottom:16px;">
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="closeModal('order-modal')">Cancel</button>
                <button class="btn btn-primary" onclick="confirmPlaceOrders()">Place Orders</button>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
